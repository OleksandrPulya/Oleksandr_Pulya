<!DOCTYPE html> <!-- Вказує, що документ є HTML5 -->
<html lang="uk"> <!-- Мова сторінки: українська -->
<head>
  <meta charset="UTF-8"> <!-- Підтримка українських символів -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Адаптація сторінки під мобільні пристрої -->
  <title>O. PULYA</title> <!-- Назва сторінки у вкладці браузера -->
  
  <!-- Підключення зовнішнього CSS-файлу зі стилями -->
  <link rel="stylesheet" href="style.css">
  
  <!-- Іконка, яка відображається на вкладці браузера -->
  <link rel="icon" type="image/png" href="logo123.png">
</head>

<body> <!-- Основна частина сторінки -->

  <!-- Контейнер для зелених анімованих плям на фоні -->
  <div class="spot-container">
    <div class="spot"></div>
    <div class="spot"></div>
    <div class="spot"></div>
    <div class="spot"></div>
    <div class="spot"></div>
    <div class="spot"></div>
    <div class="spot"></div>
  </div>

  <!-- Основний контейнер з контентом сайту -->
  <div class="container">
    
    <!-- Логотип сайту -->
    <img src="logo123.png" alt="Logo" class="logo">
    
    <!-- Заголовок сайту -->
    <h1>O. PULYA</h1>

    <!-- Вбудований Discord-чат (виджет) -->
    <iframe 
      src="https://discord.com/widget?id=1320860148067078224&theme=dark"
      width="350"
      height="500"
      allowtransparency="true"
      frameborder="0"
      sandbox="allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts">
    </iframe>

    <!-- Кнопка-посилання на TikTok (Oleksandr Pulya) -->
    <a class="button tiktok" href="https://www.tiktok.com/@oleksandr_pulya?is_from_webapp=1&sender_device=pc" target="_blank">
      <img src="logo_tik_tok.jpg" alt="TikTok"> Oleksandr Pulya
    </a>

    <!-- Кнопка-посилання на TikTok (pro.slova) -->
    <a class="button tiktok" href="https://www.tiktok.com/@pulya_10.06?is_from_webapp=1&sender_device=pc">
      <img src="logo_tik_tok.jpg" alt="TikTok"> 🕊️
    </a>

    <!-- Кнопка-посилання на Discord сервер -->
    <a class="button discord" href="https://discord.gg/yZSc5A2P" target="_blank">
      <img src="logo_discord.png" alt="Discord"> Discord
    </a>

    <!-- Кнопка-посилання на Telegram канал -->
    <a class="button telegram" href="https://t.me/addlist/gwTSxddoqas2MThi" target="_blank">
      <img src="telegram.original.jpg" alt="Telegram"> Telegram-канал
    </a>

    <!-- Кнопка-посилання на Telegram зворотній зв'язок -->
    <a class="button telegram" href="https://t.me/O_O_0_0_go_go" target="_blank">
      <img src="telegram.original.jpg" alt="Telegram"> Telegram (зворотній зв'язок)
    </a>
    
    <!-- Кнопка-посилання на Steam профіль -->
    <a class="button steam" href="https://s.team/p/hnvv-rtnh/bpqgqmdc" target="_blank">
      <img src="images.jpg" alt="Steam"> Steam
    </a>

    <!-- Нижній напис з авторським правом -->
    <footer>© 2025 O.PULYA</footer>
  </div>

  <script>
  // Заборона виділення тексту
  document.addEventListener('selectstart', function(e) {
    e.preventDefault();
  });

  // Заборона копіювання
  document.addEventListener('copy', function(e) {
    e.preventDefault();
  });

  // Заборона вирізання
  document.addEventListener('cut', function(e) {
    e.preventDefault();
  });

  // Заборона правої кнопки миші
  document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
  });

  // Заборона перетягування картинок
  document.addEventListener('dragstart', function(e) {
    if (e.target.tagName === 'IMG') {
      e.preventDefault();
    }
  });

  // Заборона Ctrl+C, Ctrl+U, Ctrl+S, F12
  document.addEventListener('keydown', function(e) {
    if (
      (e.ctrlKey && ['c','u','s'].includes(e.key.toLowerCase())) ||
      e.key === 'F12'
    ) {
      e.preventDefault();
    }
  });
</script>
  
</body>
</html>
